[package]
name = "aicent-demo"
description = "Integrated simulation suite for the Aicent Stack: A six-domain sovereign AI organism and collective hive mind."
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage = "https://aicent.com/Demo/"
documentation = "https://github.com/Aicent-Stack/manifesto"
keywords = ["ai-demo", "sovereign-ai", "reflex-arc", "swarm-intelligence", "rfc-standard"]
categories = ["simulation", "network-programming", "robotics"]

# ====================================================================
# [BINARIES] - 6-Domain Organism & Hive Simulation Suite
# Each binary demonstrates a specific RFC protocol or the unified organism.
# ====================================================================

# [RFC-001] AICENT: The Brain (Master Commander)
[[bin]]
name = "aicent-organism"
path = "src/bin/aicent-organism.rs"

# [RFC-002] RTTP: The Nerves
[[bin]]
name = "rttp-demo"
path = "src/bin/rttp-demo.rs"

# [RFC-003] RPKI: The Immunity
[[bin]]
name = "rpki-demo"
path = "src/bin/rpki-demo.rs"

# [RFC-004] ZCMK: The Blood
[[bin]]
name = "zcmk-demo"
path = "src/bin/zcmk-demo.rs"

# [RFC-005] GTIOT: The Body
[[bin]]
name = "gtiot-demo"
path = "src/bin/gtiot-demo.rs"

# [RFC-006] AICENT-NET: The Hive (Collective Mind)
[[bin]]
name = "aicent-net-demo"
path = "src/bin/aicent-net-demo.rs"

# ====================================================================
# [DEPENDENCIES] - Linked via Unified Workspace DNA
# ====================================================================

[dependencies]
# Core Organs (The 6 Pillars of Sovereignty)
aicent.workspace = true
rttp.workspace = true
rpki.workspace = true
zcmk.workspace = true
gtiot.workspace = true
aicent-net.workspace = true

# Integrated Utilities for High-Fidelity Simulation
anyhow.workspace = true
tokio = { workspace = true, features = ["full"] }
tracing.workspace = true      # For real-time telemetry logs
rand.workspace = true         # For simulating hijack/attack scenarios

[dev-dependencies]
# Benchmarking tools for sub-ms validation
criterion = "0.5"
